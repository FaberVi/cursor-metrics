<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Cursor Usage Tooltip Preview</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #1e1e1e;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .status-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 22px;
      background: #007acc;
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 10px;
      font-size: 12px;
    }
    .tooltip {
      width: 420px;
      background: #252526;
      color: #cccccc;
      border: 1px solid #454545;
      box-shadow: 0 8px 24px rgba(0,0,0,0.45);
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.45;
    }
    .tooltip table { width: 100%; border-collapse: collapse; margin: 4px 0; }
    .tooltip sub { color: #9d9d9d; font-size: 11px; }
    .tooltip strong { color: #fff; font-weight: 600; }
    .tooltip td, .tooltip th { padding: 2px 4px; vertical-align: middle; }
    .bar-track { display: inline-block; width: 120px; height: 6px; background: #3c3c3c; border-radius: 999px; overflow: hidden; vertical-align: middle; }
    .bar { display: block; height: 100%; background: #007acc; border-radius: 999px; }
    .divider { display: inline-block; width: 1px; height: 48px; background: #454545; }
  </style>
</head>
<body>
  <div class="tooltip"><table width="100%" cellspacing="0" cellpadding="0">
  <tr><td width="100%"><sub>On-Demand</sub></td></tr>
  <tr><td><strong>11,50 € / 184,00 €</strong></td></tr>
  <tr><td><span class="bar-track"><span class="bar" style="width:6%"></span></span></td></tr>
</table>
<table width="100%" cellspacing="0" cellpadding="0">
  <tr><td colspan="2"><sub>Pool incluso</sub></td></tr>
  <tr><td colspan="2"><strong>49.8% totale usato</strong></td></tr>
  <tr>
    <td width="18%"><sub>Auto</sub></td>
    <td><sub>61.4%</sub> <span class="bar-track"><span class="bar" style="width:61%"></span></span></td>
  </tr>
  <tr>
    <td><sub>API</sub></td>
    <td><sub>38.2%</sub> <span class="bar-track"><span class="bar" style="width:38%"></span></span></td>
  </tr>
</table>
<table width="100%" cellspacing="0" cellpadding="0">
  <tr><td colspan="2"><sub>Budget giornaliero</sub></td></tr>
  <tr><td colspan="2"><sub>Distribuzione uniforme fino al reset</sub></td></tr>
  <tr><td colspan="2"><sub>Reset tra 3m (02:00)</sub></td></tr>
  <tr>
    <td width="18%"><sub>Auto</sub></td>
    <td><sub>1.9% budget</sub> <span class="bar-track"><span class="bar" style="width:4%"></span></span> <sub>1.9% rimasti oggi</sub></td>
  </tr>
  <tr>
    <td width="18%"><sub>API</sub></td>
    <td><sub>3.1% budget</sub> <span class="bar-track"><span class="bar" style="width:4%"></span></span> <sub>3.1% rimasti oggi</sub></td>
  </tr>
</table>
</div>
  <div class="status-bar">61,4% Auto, 38,2% API, 11,50 €</div>
</body>
</html>
